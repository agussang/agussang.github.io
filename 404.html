<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a14;color:#e0e0e0;min-height:100vh;

.num{

  margin:18px 0 6px;text-shadow:2px 2px 0 #000;
}
.term{
  color:#00ff88;font-size:.85rem;margin:18px 0 28px;
  max-width:480px;line-height:1.8;
}
.term .c{color:#666}
.term .e{color:#ff3355}
a{
  color:#0a0a14;background:#00ff88;text-decoration:none;
  font-weight:700;font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;
  padding:12px 26px;border:2px solid #00ff88;border-radius:4px;
  box-shadow:3px 3px 0 #000;transition:all .25s;
}
a:hover{background:#0a0a14;color:#00ff88;transform:translate(-1px,-1px);box-shadow:4px 4px 0 #000}
</style>
</head>
